<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随缘打赏 · 感谢支持</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 粒子画布背景 -->
    <canvas id="particleCanvas"></canvas>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 装饰光晕 -->
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>

        <!-- 打赏卡片 -->
        <div class="reward-card" id="rewardCard">
            <!-- 顶部装饰线 -->
            <div class="card-accent-line"></div>

            <!-- 图标区域 -->
            <div class="icon-wrapper">
                <div class="icon-circle">
                    <svg class="heart-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                        fill="currentColor" />
                    </svg>
                </div>
            </div>

            <!-- 标题 -->
            <h1 class="card-title">随 缘 打 赏</h1>
            <p class="card-subtitle">您的每一份支持，都是我前进的动力</p>

            <!-- 装饰分隔线 -->
            <div class="divider">
                <span class="divider-dot"></span>
                <span class="divider-line"></span>
                <span class="divider-diamond">◆</span>
                <span class="divider-line"></span>
                <span class="divider-dot"></span>
            </div>

            <!-- 二维码展示区 -->
            <div class="qr-wrapper" id="qrWrapper">
                <div class="qr-container" id="qrContainer">
                    <!-- 二维码发光边框 -->
                    <div class="qr-glow-ring"></div>
                    <!-- 二维码图片 -->
                    <img
                    class="qr-image"
                    id="qrImage"
                    src="images/WeChat.jpg"
                    alt="打赏二维码"
                    loading="eager"
                    />
                </div>
                <!-- 扫码提示已移除 -->
                <!-- 二维码边框角标 -->
                <div class="qr-corner qr-corner-tl"></div>
                <div class="qr-corner qr-corner-tr"></div>
                <div class="qr-corner qr-corner-bl"></div>
                <div class="qr-corner qr-corner-br"></div>
            </div>

            <!-- 提示文字 -->
            <p class="qr-tip" id="qrTip">
                请使用 <strong>微信</strong> 扫码打赏
            </p>
            <p class="qr-subtip">金额随心，感谢厚爱 ❤️</p>

            <!-- 支付方式切换 -->
            <div class="payment-switch" id="paymentSwitch">
                <button class="switch-btn active" data-method="wechat" id="btnWechat">
                    <svg class="switch-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348z" />
                    </svg>
                    <span>微信打赏</span>
                </button>
                <button class="switch-btn" data-method="alipay" id="btnAlipay">
                    <svg class="switch-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm3.5 14.5h-1.8v-2.4h-3.4v2.4H8.5v-9h1.8v4.8h3.4V7.5h1.8v9z" />
                    </svg>
                    <span>支付宝打赏</span>
                </button>
            </div>

            <!-- 底部感谢语 -->
            <div class="card-footer">
                <p class="footer-text">感谢每一份温暖的心意</p>
                <div class="footer-stars">
                    <span>✦</span><span>✦</span><span>✦</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
